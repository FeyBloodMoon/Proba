<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея с реакциями</title>
    
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

    <style>
        @keyframes colorChange {
            0% { background-color: #1a1a2e; }
            50% { background-color: #16213e; }
            100% { background-color: #1a1a2e; }
        }

        body {
            margin: 0;
            animation: colorChange 20s infinite ease-in-out;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
        }

        /* Панель управления */
        .sidebar {
            position: fixed;
            left: 0; top: 0; width: 220px; height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        .auth-section { position: absolute; top: 20px; text-align: center; }
        .user-name { font-size: 14px; margin-bottom: 10px; color: #4ecca3; }

        .filter-btn, .login-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px; margin: 10px 0;
            border-radius: 8px; cursor: pointer; width: 170px; transition: 0.3s;
        }

        .filter-btn.active, .login-btn:hover { background: #4ecca3; color: #1a1a2e; border-color: #4ecca3; }

        /* Сетка */
        .main-content { margin-left: 220px; padding: 40px; width: 100%; }
        .grid-item { width: 31%; margin-bottom: 30px; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .grid-item img { width: 100%; display: block; cursor: zoom-in; transition: 0.3s; }
        
        /* Смайлики */
        .reactions { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.3); }
        .react-btn { background: none; border: none; cursor: pointer; color: white; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .react-btn:hover { transform: scale(1.2); }
        .count { font-size: 12px; opacity: 0.7; }

        /* Модалка */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="auth-section">
            <div id="userInfo" class="user-name"></div>
            <button class="login-btn" id="authBtn">Войти через Google</button>
        </div>
        <button class="filter-btn active" data-cat="all">Всё</button>
        <button class="filter-btn" data-cat="human">Люди</button>
        <button class="filter-btn" data-cat="nohuman">Нелюди</button>
    </div>

    <div class="main-content">
        <div class="grid" id="gallery"></div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img src=""></div>

    <script type="module">
		// 1. Импортируем нужные модули из твоей версии Firebase
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
		import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
		import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        // КОНФИГУРАЦИЯ FIREBASE (Вставь сюда свои данные из консоли Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyBmzORb_dZNywx-h6UgoClALZ89PxMDcOg",
            authDomain: "myproekt-345ce.firebaseapp.com",
            projectId: "myproekt-345ce",
			storageBucket: "myproekt-345ce.firebasestorage.app",
			messagingSenderId: "311323810431",
			appId: "1:311323810431:web:d009482ded971c8da1bd4a",
			measurementId: "G-4JSPPL6Y4F"
        };

        const app = initializeApp(firebaseConfig);
		const auth = getAuth(app);
		const db = getFirestore(app);
			const provider = new GoogleAuthProvider();

        let currentUser = null;

        // Список картинок (ID должен быть уникальным для каждой картинки)
        const imagesData = [
            { id: 'h1', src: 'image/Human/1.png', category: 'human' },
            { id: 'h2', src: 'image/Human/2.png', category: 'human' },
			{ id: 'h2', src: 'image/Human/3.png', category: 'human' },
			{ id: 'h2', src: 'image/Human/4.png', category: 'human' },
			{ id: 'h2', src: 'image/Human/5.png', category: 'human' },
            { id: 'n1', src: 'image/NoHuman/1.png', category: 'nohuman' },
            { id: 'n2', src: 'image/NoHuman/2.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/3.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/4.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/5.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/6.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/7.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/8.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/9.png', category: 'nohuman' },
			{ id: 'n2', src: 'image/NoHuman/10.png', category: 'nohuman' }.
			{ id: 'n2', src: 'image/NoHuman/11.png', category: 'nohuman' }
        ];

        // Авторизация
        document.getElementById('authBtn').onclick = () => signInWithPopup(auth, provider);
        
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('userInfo').innerText = `Привет, ${user.displayName.split(' ')[0]}`;
                document.getElementById('authBtn').style.display = 'none';
            }
        });

        // Отрисовка
        const gallery = document.getElementById('gallery');
        let msnry;

        function renderGallery(filter = 'all') {
            gallery.innerHTML = '';
            let filtered = imagesData.filter(i => filter === 'all' || i.category === filter);
            filtered.sort(() => Math.random() - 0.5);

            filtered.forEach(data => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = `
                    <img src="${data.src}" onclick="showImg('${data.src}')">
                    <div class="reactions">
                        <button class="react-btn" onclick="addLike('${data.id}', 'heart')">❤️ <span id="count-heart-${data.id}">0</span></button>
                        <button class="react-btn" onclick="addLike('${data.id}', 'fire')">🔥 <span id="count-fire-${data.id}">0</span></button>
                    </div>
                `;
                gallery.appendChild(item);
                syncLikes(data.id); // Подключаем живое обновление лайков
            });

            imagesLoaded(gallery, () => {
                if (msnry) msnry.destroy();
                msnry = new Masonry(gallery, { itemSelector: '.grid-item', percentPosition: true, gutter: 20 });
            });
        }

        // Функция добавления/снятия лайка (Один человек — одна реакция)
		window.addLike = async (imgId, type) => {
			if (!currentUser) return alert("Сначала войди через Google!");

			const uid = currentUser.uid; 
			const docRef = doc(db, "likes", imgId);
			
			// 1. Получаем текущие данные из базы
			const docSnap = await getDoc(docRef);
			let userData = {};
			
			if (docSnap.exists()) {
				userData = docSnap.data().users || {};
			}

			let newUserData = { ...userData };

			// 2. Логика переключения
			if (newUserData[uid] === type) {
				// Если нажали на тот же смайлик — убираем его
				delete newUserData[uid];
			} else {
				// Если нажали на другой — меняем выбор (старый затрется)
				newUserData[uid] = type;
			}

			// 3. Считаем новые итоги
			const counts = { heart: 0, fire: 0 };
			Object.values(newUserData).forEach(val => {
				if (val === 'heart') counts.heart++;
				if (val === 'fire') counts.fire++;
			});

			// 4. Записываем обратно в Firebase
			await setDoc(docRef, {
				users: newUserData,
				heart: counts.heart,
				fire: counts.fire
			}, { merge: true });
		};

		// Обновленная синхронизация
		window.syncLikes = (imgId) => {
			onSnapshot(doc(db, "likes", imgId), (docSnap) => {
				if (docSnap.exists()) {
					const data = docSnap.data();
					const heartEl = document.getElementById(`count-heart-${imgId}`);
					const fireEl = document.getElementById(`count-fire-${imgId}`);
					
					if (heartEl) heartEl.innerText = data.heart || 0;
					if (fireEl) fireEl.innerText = data.fire || 0;

					// Визуальная подсветка (опционально)
					// Здесь можно добавить смену цвета кнопок, если data.users[currentUser.uid] совпадает
				}
			});
		};

        window.showImg = (src) => {
            const lb = document.getElementById('lightbox');
            lb.querySelector('img').src = src;
            lb.style.display = 'flex';
        };

        // Фильтры
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                renderGallery(btn.dataset.cat);
            };
        });

        renderGallery();
    </script>
</body>
</html>
